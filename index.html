<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet" />
    <title>Nihongo Pass Docs</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7faf8;
        --surface: #ffffff;
        --surface-muted: #eef6f0;
        --ink: #17211b;
        --muted: #5c6f64;
        --line: #d7e4dc;
        --primary: #148a57;
        --primary-strong: #0c6b42;
        --accent: #f3b438;
        --danger: #bf3b45;
        --shadow: 0 16px 44px rgba(23, 33, 27, 0.08);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        letter-spacing: 0;
      }

      a {
        color: var(--primary-strong);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        border-right: 1px solid var(--line);
        background: var(--surface);
        padding: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .brand-mark {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 14px;
        background: var(--surface-muted);
        color: var(--primary-strong);
        font-weight: 800;
      }

      .brand-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .brand-subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .search {
        width: 100%;
        min-height: 44px;
        margin-bottom: 18px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fbfdfc;
        color: var(--ink);
        padding: 0 12px;
        outline: none;
      }

      .search:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(20, 138, 87, 0.16);
      }

      .nav-group {
        margin: 22px 0;
      }

      .nav-heading {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .nav-list {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .nav-link {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
      }

      .nav-link:hover,
      .nav-link.is-active {
        background: var(--surface-muted);
        color: var(--primary-strong);
      }

      .shell {
        min-width: 0;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        min-height: 64px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 250, 248, 0.92);
        padding: 12px 28px;
        backdrop-filter: blur(12px);
      }

      .menu-button {
        display: none;
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
      }

      .crumb {
        min-width: 0;
        color: var(--muted);
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 28px 80px;
      }

      .doc {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 42px;
      }

      .doc h1 {
        margin: 0 0 20px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.1;
      }

      .doc h2 {
        margin: 40px 0 14px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
        font-size: 24px;
      }

      .doc h3 {
        margin: 28px 0 10px;
        font-size: 19px;
      }

      .doc h4 {
        margin: 22px 0 8px;
        font-size: 16px;
      }

      .doc p,
      .doc li {
        font-size: 16px;
        line-height: 1.8;
      }

      .doc p {
        margin: 12px 0;
      }

      .doc ul,
      .doc ol {
        margin: 12px 0 18px;
        padding-left: 1.45rem;
      }

      .doc li + li {
        margin-top: 4px;
      }

      .doc table {
        width: 100%;
        margin: 18px 0 24px;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 8px;
        font-size: 14px;
      }

      .doc th,
      .doc td {
        border: 1px solid var(--line);
        padding: 10px 12px;
        vertical-align: top;
      }

      .doc th {
        background: var(--surface-muted);
        text-align: left;
      }

      .doc pre {
        overflow: auto;
        border-radius: 8px;
        background: #142018;
        color: #eff8f1;
        padding: 16px;
      }

      .doc code {
        border-radius: 6px;
        background: #edf5ef;
        color: #26382c;
        padding: 0.14em 0.34em;
        font-size: 0.92em;
      }

      .doc pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .doc blockquote {
        margin: 18px 0;
        border-left: 4px solid var(--accent);
        background: #fff8e5;
        padding: 8px 18px;
        color: #4e4227;
      }

      .doc img {
        display: block;
        max-width: min(100%, 520px);
        height: auto;
        margin: 18px auto 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbf9;
      }

      .empty-state {
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 28px;
        color: var(--muted);
      }

      .status-line {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 13px;
      }

      .doc-error {
        color: var(--danger);
      }

      .overlay {
        display: none;
      }

      @media (max-width: 860px) {
        .app {
          display: block;
        }

        .sidebar {
          position: fixed;
          z-index: 20;
          inset: 0 auto 0 0;
          width: min(86vw, 340px);
          transform: translateX(-105%);
          transition: transform 180ms ease;
        }

        body.nav-open .sidebar {
          transform: translateX(0);
        }

        .overlay {
          position: fixed;
          z-index: 15;
          inset: 0;
          display: none;
          background: rgba(10, 20, 14, 0.42);
        }

        body.nav-open .overlay {
          display: block;
        }

        .menu-button {
          display: inline-grid;
          place-items: center;
        }

        .topbar {
          padding: 10px 16px;
        }

        main {
          padding: 24px 14px 48px;
        }

        .doc {
          padding: 24px 18px;
        }

        .doc table {
          display: block;
          overflow-x: auto;
          white-space: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="ドキュメント一覧">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">日</div>
          <div>
            <h1 class="brand-title">Nihongo Pass Docs</h1>
            <p class="brand-subtitle">JLPT N2 v1 仕様</p>
          </div>
        </div>
        <input
          id="filter"
          class="search"
          type="search"
          autocomplete="off"
          placeholder="文書を絞り込み"
          aria-label="文書を絞り込み"
        />
        <nav id="navigation"></nav>
      </aside>

      <div class="overlay" id="overlay"></div>

      <div class="shell">
        <header class="topbar">
          <button class="menu-button" id="menuButton" type="button" aria-label="メニューを開く">
            ☰
          </button>
          <div class="crumb" id="crumb">docs/features.md</div>
        </header>

        <main>
          <p class="status-line">公開 URL を知っている人向けの仕様閲覧ページです。</p>
          <article class="doc" id="document">
            <div class="empty-state">読み込み中です。</div>
          </article>
        </main>
      </div>
    </div>

    <script>
      const documents = [
        {
          group: "Overview",
          title: "Features",
          path: "features.md",
          description: "初回リリースの上位仕様",
        },
        {
          group: "Overview",
          title: "Design",
          path: "DESIGN.md",
          description: "UI と文言の設計ルール",
        },
        {
          group: "Specs",
          title: "Spec Rules",
          path: "specs/README.md",
          description: "仕様作成ルール",
        },
        {
          group: "Specs",
          title: "First Launch",
          path: "specs/first-launch/login-entry.md",
          description: "初回起動とログイン入口",
        },
        {
          group: "Specs",
          title: "Onboarding",
          path: "specs/onboarding/n2-goal-setup.md",
          description: "N2 目標設定",
        },
        {
          group: "Specs",
          title: "Diagnostic",
          path: "specs/diagnostic/n2-ten-question-check.md",
          description: "10 問診断",
        },
        {
          group: "Specs",
          title: "Home",
          path: "specs/home/home.md",
          description: "Home 画面",
        },
        {
          group: "Specs",
          title: "Dictionary",
          path: "specs/dictionary/dictionary.md",
          description: "辞書",
        },
        {
          group: "Specs",
          title: "Learn",
          path: "specs/learn/n2-learn-tabs.md",
          description: "N2 Learn タブ",
        },
        {
          group: "Specs",
          title: "Study Plan",
          path: "specs/study-plan/daily-plan.md",
          description: "毎日の学習計画",
        },
        {
          group: "Specs",
          title: "Practice",
          path: "specs/practice/daily-practice.md",
          description: "毎日の演習",
        },
        {
          group: "Specs",
          title: "Review",
          path: "specs/review/weakness-review.md",
          description: "弱点復習",
        },
        {
          group: "Specs",
          title: "Mock Exam",
          path: "specs/mock-exam/n2-mini-mock.md",
          description: "ミニ模試",
        },
        {
          group: "Specs",
          title: "Prediction",
          path: "specs/prediction/pass-probability.md",
          description: "合格可能性",
        },
        {
          group: "Specs",
          title: "Content Policy",
          path: "specs/content/question-content-policy.md",
          description: "問題コンテンツ方針",
        },
        {
          group: "Template",
          title: "Spec Template",
          path: "specs/_template.md",
          description: "新規仕様テンプレート",
        },
      ];

      const state = {
        activePath: "",
        filter: "",
      };

      const navigation = document.getElementById("navigation");
      const docRoot = document.getElementById("document");
      const crumb = document.getElementById("crumb");
      const filterInput = document.getElementById("filter");
      const menuButton = document.getElementById("menuButton");
      const overlay = document.getElementById("overlay");

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function stripDocsPrefix(path) {
        return path.replace(/^docs\//, "");
      }

      function normalizePath(path, basePath) {
        if (!path) {
          return "";
        }
        const cleanBase = basePath ? basePath.split("/").slice(0, -1) : [];
        const parts = path.replace(/^docs\//, "").split("/");
        const stack = path.startsWith("./") || path.startsWith("../") ? cleanBase : [];
        for (const part of parts) {
          if (!part || part === ".") continue;
          if (part === "..") {
            stack.pop();
          } else {
            stack.push(part);
          }
        }
        return stack.join("/");
      }

      function slugify(text) {
        return text
          .trim()
          .toLowerCase()
          .replace(/<[^>]+>/g, "")
          .replace(/[^\p{Letter}\p{Number}\s-]/gu, "")
          .replace(/\s+/g, "-");
      }

      function currentDoc() {
        return documents.find((doc) => doc.path === state.activePath) || documents[0];
      }

      function docHash(path) {
        return "#" + encodeURIComponent(path);
      }

      function parseHash() {
        const value = decodeURIComponent(location.hash.replace(/^#/, ""));
        return documents.some((doc) => doc.path === value) ? value : documents[0].path;
      }

      function resolveAsset(url, basePath) {
        if (/^(https?:|mailto:|data:|#)/i.test(url)) {
          return url;
        }
        return encodeURI(normalizePath(url, basePath));
      }

      function resolveLink(url, basePath) {
        if (/^(https?:|mailto:|data:)/i.test(url)) {
          return url;
        }
        if (url.startsWith("#")) {
          return url;
        }
        const [target, anchor] = url.split("#");
        const normalized = normalizePath(stripDocsPrefix(target), basePath);
        if (normalized.endsWith(".md")) {
          return docHash(normalized) + (anchor ? "-" + encodeURIComponent(anchor) : "");
        }
        return encodeURI(anchor ? `${normalized}#${anchor}` : normalized);
      }

      function renderInline(value, basePath) {
        let html = escapeHtml(value);
        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => {
          return `<img src="${resolveAsset(url, basePath)}" alt="${escapeHtml(alt)}" loading="lazy" />`;
        });
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
          const resolved = resolveLink(url, basePath);
          return `<a href="${resolved}">${label}</a>`;
        });
        html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        return html;
      }

      function parseTable(lines, start, basePath) {
        const rows = [];
        let index = start;
        while (index < lines.length && /^\s*\|.*\|\s*$/.test(lines[index])) {
          rows.push(lines[index]);
          index += 1;
        }
        if (rows.length < 2 || !/^\s*\|?\s*:?-{3,}:?\s*\|/.test(rows[1])) {
          return null;
        }
        const cells = (row) =>
          row
            .trim()
            .replace(/^\|/, "")
            .replace(/\|$/, "")
            .split("|")
            .map((cell) => cell.trim());
        const head = cells(rows[0]);
        const body = rows.slice(2).map(cells);
        const headerHtml = head
          .map((cell) => `<th>${renderInline(cell, basePath)}</th>`)
          .join("");
        const bodyHtml = body
          .map(
            (row) =>
              `<tr>${row
                .map((cell) => `<td>${renderInline(cell, basePath)}</td>`)
                .join("")}</tr>`,
          )
          .join("");
        return {
          html: `<table><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>`,
          next: index,
        };
      }

      function parseList(lines, start, basePath, ordered) {
        const tag = ordered ? "ol" : "ul";
        const pattern = ordered ? /^\s*\d+\.\s+(.+)$/ : /^\s*[-*]\s+(.+)$/;
        const items = [];
        let index = start;
        while (index < lines.length) {
          const match = lines[index].match(pattern);
          if (!match) break;
          const checkbox = match[1].match(/^\[([ xX])\]\s+(.+)$/);
          const marker = checkbox
            ? `<input type="checkbox" disabled ${checkbox[1].toLowerCase() === "x" ? "checked" : ""} /> `
            : "";
          const item = checkbox ? checkbox[2] : match[1];
          items.push(`<li>${marker}${renderInline(item, basePath)}</li>`);
          index += 1;
        }
        return {
          html: `<${tag}>${items.join("")}</${tag}>`,
          next: index,
        };
      }

      function parseMarkdown(markdown, basePath) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        const blocks = [];
        let index = 0;
        while (index < lines.length) {
          const line = lines[index];
          if (!line.trim()) {
            index += 1;
            continue;
          }

          const fence = line.match(/^```(\w+)?\s*$/);
          if (fence) {
            const language = fence[1] || "";
            const code = [];
            index += 1;
            while (index < lines.length && !/^```\s*$/.test(lines[index])) {
              code.push(lines[index]);
              index += 1;
            }
            index += 1;
            blocks.push(
              `<pre><code class="language-${escapeHtml(language)}">${escapeHtml(
                code.join("\n"),
              )}</code></pre>`,
            );
            continue;
          }

          const table = parseTable(lines, index, basePath);
          if (table) {
            blocks.push(table.html);
            index = table.next;
            continue;
          }

          const heading = line.match(/^(#{1,4})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            const content = renderInline(heading[2], basePath);
            blocks.push(`<h${level} id="${slugify(content)}">${content}</h${level}>`);
            index += 1;
            continue;
          }

          if (/^\s*[-*]\s+/.test(line)) {
            const list = parseList(lines, index, basePath, false);
            blocks.push(list.html);
            index = list.next;
            continue;
          }

          if (/^\s*\d+\.\s+/.test(line)) {
            const list = parseList(lines, index, basePath, true);
            blocks.push(list.html);
            index = list.next;
            continue;
          }

          if (/^\s*>/.test(line)) {
            const quote = [];
            while (index < lines.length && /^\s*>/.test(lines[index])) {
              quote.push(lines[index].replace(/^\s*>\s?/, ""));
              index += 1;
            }
            blocks.push(`<blockquote>${renderInline(quote.join(" "), basePath)}</blockquote>`);
            continue;
          }

          const paragraph = [line];
          index += 1;
          while (
            index < lines.length &&
            lines[index].trim() &&
            !/^(#{1,4})\s+/.test(lines[index]) &&
            !/^```/.test(lines[index]) &&
            !/^\s*\|.*\|\s*$/.test(lines[index]) &&
            !/^\s*[-*]\s+/.test(lines[index]) &&
            !/^\s*\d+\.\s+/.test(lines[index])
          ) {
            paragraph.push(lines[index]);
            index += 1;
          }
          blocks.push(`<p>${renderInline(paragraph.join(" "), basePath)}</p>`);
        }
        return blocks.join("\n");
      }

      function renderNavigation() {
        const filter = state.filter.trim().toLowerCase();
        const groups = new Map();
        for (const doc of documents) {
          const haystack = `${doc.title} ${doc.description} ${doc.path}`.toLowerCase();
          if (filter && !haystack.includes(filter)) continue;
          if (!groups.has(doc.group)) groups.set(doc.group, []);
          groups.get(doc.group).push(doc);
        }
        if (!groups.size) {
          navigation.innerHTML = '<div class="empty-state">一致する文書がありません。</div>';
          return;
        }
        navigation.innerHTML = Array.from(groups.entries())
          .map(([group, docs]) => {
            const links = docs
              .map(
                (doc) =>
                  `<li><button class="nav-link ${
                    doc.path === state.activePath ? "is-active" : ""
                  }" type="button" data-path="${doc.path}"><strong>${doc.title}</strong><br /><span>${doc.description}</span></button></li>`,
              )
              .join("");
            return `<section class="nav-group"><h2 class="nav-heading">${group}</h2><ul class="nav-list">${links}</ul></section>`;
          })
          .join("");
      }

      async function loadDocument(path) {
        const doc = documents.find((item) => item.path === path) || documents[0];
        state.activePath = doc.path;
        crumb.textContent = `docs/${doc.path}`;
        renderNavigation();
        docRoot.innerHTML = '<div class="empty-state">読み込み中です。</div>';
        try {
          const response = await fetch(doc.path, { cache: "no-cache" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const markdown = await response.text();
          docRoot.innerHTML = parseMarkdown(markdown, doc.path);
          document.title = `${doc.title} - Nihongo Pass Docs`;
          window.scrollTo(0, 0);
        } catch (error) {
          docRoot.innerHTML = `<div class="empty-state doc-error">docs/${doc.path} を読み込めませんでした。</div>`;
        }
      }

      navigation.addEventListener("click", (event) => {
        const button = event.target.closest("[data-path]");
        if (!button) return;
        location.hash = docHash(button.dataset.path);
        document.body.classList.remove("nav-open");
      });

      filterInput.addEventListener("input", (event) => {
        state.filter = event.target.value;
        renderNavigation();
      });

      menuButton.addEventListener("click", () => {
        document.body.classList.toggle("nav-open");
      });

      overlay.addEventListener("click", () => {
        document.body.classList.remove("nav-open");
      });

      window.addEventListener("hashchange", () => {
        loadDocument(parseHash());
      });

      loadDocument(parseHash());
    </script>
  </body>
</html>
